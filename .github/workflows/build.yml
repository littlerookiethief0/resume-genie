name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    name: Prepare draft release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          version="$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json', encoding='utf-8'))['version'])")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Clean existing draft release assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: v${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const release = releases.find((item) => item.tag_name === tag && item.draft);

            if (!release) {
              core.info(`No draft release found for ${tag}, nothing to clean.`);
              return;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });

            if (assets.length === 0) {
              core.info(`Draft release ${tag} has no existing assets.`);
              return;
            }

            for (const asset of assets) {
              core.info(`Deleting old asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
            }

  build:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
            python-setup: bash scripts/prepare-python.sh
            bundle-args: --bundles app
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)
            python-setup: scripts\prepare-python.bat
            bundle-args:

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin

      - name: Download standalone Python (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd python-scripts
          curl -L https://github.com/indygreg/python-build-standalone/releases/download/20241016/cpython-3.12.7+20241016-aarch64-apple-darwin-install_only_stripped.tar.gz -o python.tar.gz
          mkdir -p python
          tar -xzf python.tar.gz -C python --strip-components=1
          rm python.tar.gz
          ./python/bin/python3 -m pip install -r requirements.txt

      - name: Download standalone Python (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd python-scripts
          curl -L https://github.com/indygreg/python-build-standalone/releases/download/20241016/cpython-3.12.7+20241016-x86_64-pc-windows-msvc-shared-install_only_stripped.tar.gz -o python.tar.gz
          mkdir python
          tar -xzf python.tar.gz -C python --strip-components=1
          Remove-Item python.tar.gz
          python\python.exe -m pip install -r requirements.txt

      - name: Install frontend dependencies
        run: pnpm install

      # 量化安装包体积来源：嵌入式解释器 vs site-packages（便于确认 Playwright 等占比）
      - name: Report embedded Python bundle size (du)
        shell: bash
        run: |
          set -e
          cd python-scripts
          echo "=== python-scripts (total) ==="
          du -sh .
          echo "=== python/ (embedded interpreter) ==="
          du -sh python 2>/dev/null || echo "no python/"
          PY_SITE=""
          if [ -d python/lib/python3.12/site-packages ]; then PY_SITE=python/lib/python3.12/site-packages; fi
          if [ -d python/lib/python3.13/site-packages ]; then PY_SITE=python/lib/python3.13/site-packages; fi
          if [ -d python/Lib/site-packages ]; then PY_SITE=python/Lib/site-packages; fi
          if [ -n "$PY_SITE" ]; then
            echo "=== site-packages (top 25 by size) ==="
            du -sh "$PY_SITE"/* 2>/dev/null | sort -hr | head -25
          else
            echo "site-packages not found; searching:"
            find python -type d -name site-packages 2>/dev/null | head -5 || true
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 避免部分环境下 CI 变量导致 tauri-cli 参数异常
          CI: false
        with:
          projectPath: src-tauri
          tagName: v__VERSION__
          releaseName: 'Resume Genie v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} ${{ matrix.bundle-args }}

      - name: Build DMG manually (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/简历精灵.app"
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          VERSION="$(python3 -c "import json;print(json.load(open('src-tauri/tauri.conf.json', encoding='utf-8'))['version'])")"
          DMG_PATH="$DMG_DIR/简历精灵_${VERSION}_aarch64.dmg"
          STAGE_DIR="$(mktemp -d)/dmg-root"
          mkdir -p "$DMG_DIR"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found: $APP_PATH"
            exit 1
          fi
          mkdir -p "$STAGE_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          # 采用标准 HFS+ 镜像格式，并在产出后校验，避免“磁盘映像已损坏”
          hdiutil create -fs HFS+ -volname "简历精灵" -srcfolder "$STAGE_DIR" -ov -format UDZO "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: resume-genie-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: resume-genie-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
